
# /etc/keyd/default.conf

[ids]

*

[main]
# stupid copilot key
leftmeta+leftshift+f23 = rightcontrol

shift = oneshot(shift)
meta = oneshot(meta)
control = oneshot(control)

leftalt = oneshot(alt)
rightalt = oneshot(altgr)

capslock = overload(control, esc)
esc = capslock

[shift]
space = overloadt(shift, space, 200)
